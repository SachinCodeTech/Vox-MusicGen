<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f5ff" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#f472b6" />
    </linearGradient>
    <radialGradient id="glow-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5ff" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#00000a" stop-opacity="0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="#03030e" stroke="#12132e" stroke-width="8" />
  <!-- Glow Effect -->
  <circle cx="256" cy="256" r="220" fill="url(#glow-grad)" />
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="url(#cyber-grad)" stroke-width="8" stroke-dasharray="10 15" opacity="0.6" />
  <!-- Center Equalizer bars -->
  <g transform="translate(112, 112)" stroke="url(#cyber-grad)" stroke-width="24" stroke-linecap="round">
    <line x1="40" y1="120" x2="40" y2="168" />
    <line x1="100" y1="70" x2="100" y2="218" />
    <line x1="160" y1="30" x2="160" y2="258" />
    <line x1="220" y1="70" x2="220" y2="218" />
    <line x1="280" y1="120" x2="280" y2="168" />
  </g>
  <!-- Center design core -->
  <circle cx="272" cy="256" r="16" fill="#ffffff" />
</svg>
